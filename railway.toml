[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash -c 'echo STARTING_DJEN_MONITOR; echo PORT=$PORT; echo DATABASE_URL_LEN=${#DATABASE_URL}; echo PWD=$(pwd); echo WHOAMI=$(whoami); ls -la; ls -la dist/ 2>&1; exec node dist/server.js 2>&1 | tee /tmp/runtime.log'"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckInterval = 15

[[crons]]
schedule = "0 7 * * 1-5"
command = "node dist/index.js cron daily"

[[crons]]
schedule = "0 */4 * * *"
command = "node dist/index.js cron notify"

[[crons]]
schedule = "0 0 1 1 *"
command = "node dist/index.js cron holidays"