[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "echo '=== DJEN MONITOR STARTING ===' && echo 'PORT='$PORT && echo 'NODE_ENV='$NODE_ENV && echo 'DATABASE_URL set: '$(test -n \"$DATABASE_URL\" && echo yes || echo no) && echo 'PWD='$(pwd) && echo 'User='$(whoami) && echo 'Files:' && ls -la && echo '=== EXECUTING NODE ===' && exec node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckInterval = 15

[[crons]]
schedule = "0 7 * * 1-5"
command = "node dist/index.js cron daily"

[[crons]]
schedule = "0 */4 * * *"
command = "node dist/index.js cron notify"

[[crons]]
schedule = "0 0 1 1 *"
command = "node dist/index.js cron holidays"